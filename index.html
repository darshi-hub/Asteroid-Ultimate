<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Space Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        #score-board {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        #health-board {
            font-size: 20px;
            color: #44ff44;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
            pointer-events: none;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 60px;
            border-radius: 15px;
            border: 2px solid #3388ff;
            box-shadow: 0 0 20px #3388ff;
        }
        #game-over h1 {
            margin-top: 0;
            font-size: 48px;
            color: #ff4444;
        }
        button {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #3388ff;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 25px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #2266cc;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-board">Score: <span id="score">0</span></div>
        <div id="health-board">Health: <span id="health">100</span>%</div>
    </div>
    
    <div id="controls-hint">
        WASD / Arrows to Move | SPACE to Shoot
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p style="font-size: 24px;">Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Play Again</button>
    </div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        class Game {
            constructor() {
                // Game State
                this.score = 0;
                this.health = 100;
                this.isActive = true;
                
                // Entities
                this.lasers = [];
                this.asteroids = [];
                
                // Inputs
                this.keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false, ' ': false };
                this.lastShootTime = 0;

                // Initialization order
                this.initGame();
                this.setupUI();
                this.setupInputs();
                this.createStars();

                // Bind animation loop and start
                this.animate = this.animate.bind(this);
                requestAnimationFrame(this.animate);
            }

            initGame() {
                // Setup Three.js Scene
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x000000, 0.008);

                // Setup Camera
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 4, 12);
                this.camera.lookAt(0, 0, 0);

                // Setup WebGL Renderer
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(this.renderer.domElement);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0x404040, 2); 
                this.scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
                directionalLight.position.set(10, 20, 10);
                this.scene.add(directionalLight);

                // Build and add the Player Ship
                this.ship = this.buildShipMesh();
                this.scene.add(this.ship);

                // Handle Window Resizing
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            buildShipMesh() {
                const group = new THREE.Group();
                
                // Materials
                const hullMaterial = new THREE.MeshStandardMaterial({ color: 0x2288ff, flatShading: true });
                const detailMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, flatShading: true });
                const cockpitMaterial = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.8 });

                // 1. Ship Body (Cone)
                const bodyGeo = new THREE.ConeGeometry(0.8, 3, 8);
                bodyGeo.rotateX(-Math.PI / 2); 
                const bodyMesh = new THREE.Mesh(bodyGeo, hullMaterial);
                group.add(bodyMesh);

                // 2. Wings (Box)
                const wingGeo = new THREE.BoxGeometry(4, 0.2, 1.2);
                const wingMesh = new THREE.Mesh(wingGeo, detailMaterial);
                wingMesh.position.set(0, -0.2, 0.5); 
                group.add(wingMesh);

                // 3. Cockpit
                // FIX: CapsuleGeometry was introduced in later versions of Three.js. 
                // For r128, we use a Cylinder combined with Spheres or just a Cylinder for the cockpit bubble.
                const cockpitGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 8);
                cockpitGeo.rotateX(-Math.PI / 2);
                const cockpitMesh = new THREE.Mesh(cockpitGeo, cockpitMaterial);
                cockpitMesh.position.set(0, 0.4, -0.2);
                group.add(cockpitMesh);

                // 4. Engines (Left & Right)
                const engineGeo = new THREE.CylinderGeometry(0.2, 0.3, 0.8, 8);
                engineGeo.rotateX(Math.PI / 2);
                
                const engineL = new THREE.Mesh(engineGeo, detailMaterial);
                engineL.position.set(-1.2, -0.2, 1);
                group.add(engineL);

                const engineR = new THREE.Mesh(engineGeo, detailMaterial);
                engineR.position.set(1.2, -0.2, 1);
                group.add(engineR);

                return group;
            }

            createStars() {
                const starsGeo = new THREE.BufferGeometry();
                const starsCount = 2000;
                const posArray = new Float32Array(starsCount * 3);

                for (let i = 0; i < starsCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 300; 
                }

                starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const starsMat = new THREE.PointsMaterial({ size: 0.2, color: 0xffffff });
                
                this.starField = new THREE.Points(starsGeo, starsMat);
                this.scene.add(this.starField);
            }

            setupInputs() {
                window.addEventListener('keydown', (e) => {
                    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
                    if (this.keys.hasOwnProperty(key)) {
                        this.keys[key] = true;
                    }
                });

                window.addEventListener('keyup', (e) => {
                    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
                    if (this.keys.hasOwnProperty(key)) {
                        this.keys[key] = false;
                    }
                });
            }

            setupUI() {
                const restartBtn = document.getElementById('restart-btn');
                restartBtn.addEventListener('click', () => {
                    this.resetGame();
                });
            }

            updateShip(dt) {
                const speed = 15 * dt;
                
                if (this.keys['ArrowUp'] || this.keys['w']) this.ship.position.y += speed;
                if (this.keys['ArrowDown'] || this.keys['s']) this.ship.position.y -= speed;
                if (this.keys['ArrowLeft'] || this.keys['a']) this.ship.position.x -= speed;
                if (this.keys['ArrowRight'] || this.keys['d']) this.ship.position.x += speed;

                this.ship.position.x = Math.max(-12, Math.min(12, this.ship.position.x));
                this.ship.position.y = Math.max(-6, Math.min(6, this.ship.position.y));

                this.ship.rotation.z = -this.ship.position.x * 0.05;
                this.ship.rotation.x = this.ship.position.y * 0.05;
            }

            shoot() {
                const now = Date.now();
                if (now - this.lastShootTime > 150) {
                    const laserGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5, 8);
                    laserGeo.rotateX(Math.PI / 2);
                    const laserMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                    
                    const createLaser = (offsetX) => {
                        const laser = new THREE.Mesh(laserGeo, laserMat);
                        laser.position.copy(this.ship.position);
                        laser.position.x += offsetX;
                        laser.position.z -= 1.5;
                        this.scene.add(laser);
                        this.lasers.push(laser);
                    };

                    createLaser(-1.2); 
                    createLaser(1.2);  

                    this.lastShootTime = now;
                }
            }

            spawnAsteroid() {
                if (Math.random() < 0.06) {
                    const size = Math.random() * 1.5 + 0.8; 
                    const geo = new THREE.DodecahedronGeometry(size, 0); 
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: 0x777777, 
                        roughness: 0.9, 
                        flatShading: true 
                    });
                    
                    const asteroid = new THREE.Mesh(geo, mat);
                    asteroid.position.set(
                        (Math.random() - 0.5) * 35,
                        (Math.random() - 0.5) * 20,
                        -80 
                    );

                    asteroid.userData = {
                        size: size,
                        rotX: (Math.random() - 0.5) * 0.05,
                        rotY: (Math.random() - 0.5) * 0.05,
                        rotZ: (Math.random() - 0.5) * 0.05,
                        speed: Math.random() * 25 + 15 
                    };

                    this.scene.add(asteroid);
                    this.asteroids.push(asteroid);
                }
            }

            updateUI() {
                document.getElementById('score').innerText = this.score;
                const healthEl = document.getElementById('health');
                healthEl.innerText = Math.max(0, this.health);
                
                if (this.health > 50) healthEl.style.color = '#44ff44';
                else if (this.health > 25) healthEl.style.color = '#ffff44';
                else healthEl.style.color = '#ff4444';
            }

            gameOver() {
                this.isActive = false;
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = this.score;
            }

            resetGame() {
                document.getElementById('game-over').style.display = 'none';
                this.score = 0;
                this.health = 100;
                this.updateUI();

                this.asteroids.forEach(a => this.scene.remove(a));
                this.lasers.forEach(l => this.scene.remove(l));
                this.asteroids = [];
                this.lasers = [];

                this.ship.position.set(0, 0, 0);
                this.ship.rotation.set(0, 0, 0);
                
                this.keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false, ' ': false };
                this.isActive = true;
            }

            animate() {
                requestAnimationFrame(this.animate);
                const dt = 0.016; 

                if (this.isActive) {
                    this.updateShip(dt);
                    if (this.keys[' ']) this.shoot();

                    for (let i = this.lasers.length - 1; i >= 0; i--) {
                        let l = this.lasers[i];
                        l.position.z -= 60 * dt; 
                        if (l.position.z < -100) {
                            this.scene.remove(l);
                            this.lasers.splice(i, 1);
                        }
                    }

                    this.spawnAsteroid();
                    
                    for (let i = this.asteroids.length - 1; i >= 0; i--) {
                        let a = this.asteroids[i];
                        a.position.z += a.userData.speed * dt;
                        a.rotation.x += a.userData.rotX;
                        a.rotation.y += a.userData.rotY;
                        a.rotation.z += a.userData.rotZ;

                        if (a.position.distanceTo(this.ship.position) < a.userData.size + 0.8) {
                            this.health -= 25; 
                            this.updateUI();
                            this.scene.remove(a);
                            this.asteroids.splice(i, 1);
                            if (this.health <= 0) this.gameOver();
                            continue; 
                        }

                        let hit = false;
                        for (let j = this.lasers.length - 1; j >= 0; j--) {
                            let l = this.lasers[j];
                            if (a.position.distanceTo(l.position) < a.userData.size + 0.5) {
                                this.score += 10;
                                this.updateUI();
                                this.scene.remove(l);
                                this.lasers.splice(j, 1);
                                this.scene.remove(a);
                                this.asteroids.splice(i, 1);
                                hit = true;
                                break;
                            }
                        }
                        
                        if (hit) continue;

                        if (a.position.z > 15) {
                            this.scene.remove(a);
                            this.asteroids.splice(i, 1);
                        }
                    }
                }

                if (this.starField) {
                    this.starField.position.z += 20 * dt;
                    if (this.starField.position.z > 100) {
                        this.starField.position.z = 0; 
                    }
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        window.onload = () => {
            new Game();
        };
    </script>
</body>
</html>
