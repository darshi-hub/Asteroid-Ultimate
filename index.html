<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Asteroid Blaster — Upgraded</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
  :root{
    --ui-size: 16px;
  }
  html,body{height:100%;margin:0;background:#02030a;color:#fff;font-family:system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial}
  canvas{display:block; width:100vw; height:100vh;}
  #ui {
    position: absolute; left:12px; top:12px; z-index:30;
    background: rgba(0,0,0,0.25); padding:10px; border-radius:8px;
    backdrop-filter: blur(4px);
  }
  #center{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    z-index:30; text-align:center;
  }
  .btn {
    background:linear-gradient(#2e8ef7,#1b5fd1);
    border:none;color:white;padding:10px 14px;border-radius:8px;margin:6px;font-size:16px;cursor:pointer;
    box-shadow:0 6px 14px rgba(11,72,137,0.35);
  }
  .small { font-size:14px;padding:6px 10px }
  #weapons { display:flex; gap:8px; margin-top:8px; }
  .weaponBtn { background:#222;border:1px solid rgba(255,255,255,0.06); color:#ddd;padding:8px;border-radius:6px;cursor:pointer; }
  #mobileControls { position: absolute; z-index:40; right:12px; bottom:12px; display:none; }
  #mobileControls .fire { width:84px;height:84px;border-radius:50%; background:linear-gradient(#ff5b5b,#ce2d2d); display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px; box-shadow: 0 8px 18px rgba(255,60,60,0.2); }
  #joystickLeft { position:absolute; left:12px; bottom:12px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,0.02); display:none; z-index:40; }
  #status { margin-top:6px; color:#cfeaff; font-size:14px; }
  #help { color:#a9c6ff; font-size:13px; margin-top:8px; }
  @media (max-width:900px){
    #mobileControls, #joystickLeft { display:block; }
    #ui { font-size:14px }
  }
</style>
</head>
<body>
<div id="ui">
  Score: <span id="score">0</span><br>
  Lives: <span id="lives">3</span> &nbsp; Level: <span id="level">1</span><br>
  <div id="status"></div>
  <div id="weapons">
    <button class="weaponBtn" data-w="0">1 • Single</button>
    <button class="weaponBtn" data-w="1">2 • Spread</button>
    <button class="weaponBtn" data-w="2">3 • Rapid</button>
  </div>
  <div id="help">KB: ←→ rotate, ↑ thrust, Click shoot. Mobile: left joystick move, right fire/tap to aim.</div>
</div>

<div id="center">
  <div id="title" style="font-size:40px; font-weight:700; margin-bottom:12px;">ASTEROID BLASTER</div>
  <div>
    <button class="btn" id="startBtn">Start Game</button>
    <button class="btn small" id="pauseBtn">Pause</button>
  </div>
</div>

<!-- Mobile controls -->
<div id="mobileControls">
  <div id="joystickLeft"></div>
  <div style="position:relative;">
    <div id="fireButton" class="fire">FIRE</div>
  </div>
</div>

<canvas id="c"></canvas>

<script>
/*
  Asteroid Blaster — Upgraded
  - All assets are generated at runtime (offscreen canvas).
  - Wrap-around for ship & bullets.
  - Asteroids spawn outside the view and move inward.
  - Enemies are visually distinct (UFO).
  - Weapon switcher instant & works (1/2/3 keys or UI).
  - Mobile joystick + fire button.
*/

(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });
  let DPR = Math.max(1, window.devicePixelRatio || 1);

  function resize() {
    DPR = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // UI refs
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const center = document.getElementById('center');
  const weaponBtns = document.querySelectorAll('.weaponBtn');
  const statusEl = document.getElementById('status');
  const joystickLeft = document.getElementById('joystickLeft');
  const fireButton = document.getElementById('fireButton');

  // GAME STATE
  let state = {
    running: false,
    paused: false,
    score: 0,
    lives: 3,
    level: 1,
  };

  // Entities
  let ship, bullets, asteroids, particles, enemies;
  let keys = {};
  let mouse = {x:0,y:0,down:false};
  let lastTime = 0;

  // Weapons
  const weapons = [
    { name:'Single', cooldown: 220, bulletsPerShot:1, spread:0, speed:10 },
    { name:'Spread', cooldown: 420, bulletsPerShot:5, spread:0.5, speed:9 },
    { name:'Rapid', cooldown: 80, bulletsPerShot:1, spread:0, speed:12 },
  ];
  let currentWeapon = 0;
  let weaponTimer = 0;

  // Sprites created on init
  const SPRITES = {};

  // Utility
  function rand(min,max){ return Math.random()*(max-min)+min; }
  function dist(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
  function wrapPos(p){
    if (p.x < 0) p.x += canvas.width/DPR;
    if (p.x > canvas.width/DPR) p.x -= canvas.width/DPR;
    if (p.y < 0) p.y += canvas.height/DPR;
    if (p.y > canvas.height/DPR) p.y -= canvas.height/DPR;
  }

  // --- Generate sprites (offscreen canvases) ---
  function makeShipSprite(size=80){
    const s = document.createElement('canvas');
    s.width = s.height = size;
    const g = s.getContext('2d');
    g.translate(size/2, size/2);
    // hull
    const r = size*0.32;
    g.beginPath();
    g.moveTo(r,0);
    g.quadraticCurveTo(r*0.3, r*0.9, 0, r*1.05);
    g.quadraticCurveTo(-r*0.3, r*0.9, -r,0);
    g.quadraticCurveTo(-r*0.3, -r*0.9, 0, -r*1.05);
    g.quadraticCurveTo(r*0.3, -r*0.9, r,0);
    g.closePath();
    const hull = g.createLinearGradient(-r, -r, r, r);
    hull.addColorStop(0,'#84dbff'); hull.addColorStop(0.55,'#6ad1ff'); hull.addColorStop(1,'#2ea6ff');
    g.fillStyle = hull;
    g.fill();
    g.lineWidth = 3; g.strokeStyle = 'rgba(10,30,60,0.9)'; g.stroke();

    // cockpit
    g.beginPath();
    g.ellipse(0, -4, r*0.5, r*0.32, 0, 0, Math.PI*2);
    const cockpit = g.createLinearGradient(0,-r,0,r);
    cockpit.addColorStop(0,'rgba(255,255,255,0.95)');
    cockpit.addColorStop(1,'rgba(180,230,255,0.9)');
    g.fillStyle = cockpit; g.fill();
    g.strokeStyle='rgba(20,50,80,0.8)'; g.stroke();

    // engine glow (center back)
    const glow = g.createRadialGradient(0, r*0.5, r*0.05, 0, r*0.5, r*0.7);
    glow.addColorStop(0,'rgba(255,200,100,0.95)'); glow.addColorStop(0.6,'rgba(255,130,20,0.6)'); glow.addColorStop(1,'rgba(255,80,10,0.0)');
    g.fillStyle = glow;
    g.beginPath();
    g.ellipse(0,r*0.6,r*0.26,r*0.12,0,0,Math.PI*2); g.fill();

    // small markings
    g.fillStyle='rgba(0,0,0,0.08)'; g.beginPath();
    g.ellipse(-r*0.25,0,r*0.08,r*0.05,0,0,Math.PI*2); g.fill();

    return s;
  }

  function makeAsteroidSprite(radius=60){
    const s = document.createElement('canvas');
    s.width = s.height = radius*2;
    const g = s.getContext('2d');
    const cx = radius, cy = radius;
    // base noise shape
    g.fillStyle = '#7b6a55';
    g.beginPath();
    const spikes = 10;
    for(let i=0;i<spikes;i++){
      const a = (i/spikes)*Math.PI*2;
      const rr = radius*(0.7 + Math.random()*0.6);
      const x = cx + Math.cos(a)*rr;
      const y = cy + Math.sin(a)*rr;
      if(i===0) g.moveTo(x,y); else g.lineTo(x,y);
    }
    g.closePath();
    g.fill();

    // texture: small craters
    for(let i=0;i<18;i++){
      const cr = rand(3,radius*0.18);
      const a = Math.random()*Math.PI*2;
      const rr = Math.random()*(radius-10);
      const x = cx + Math.cos(a)*rr;
      const y = cy + Math.sin(a)*rr;
      g.fillStyle = `rgba(0,0,0,${0.12+Math.random()*0.2})`;
      g.beginPath(); g.ellipse(x,y,cr,cr*0.6,0,0,Math.PI*2); g.fill();
    }

    // subtle highlight
    const grad = g.createRadialGradient(cx- radius*0.3, cy- radius*0.3, 1, cx, cy, radius);
    grad.addColorStop(0,'rgba(255,255,255,0.04)'); grad.addColorStop(1,'rgba(0,0,0,0.0)');
    g.fillStyle = grad; g.beginPath(); g.arc(cx,cy,radius,0,Math.PI*2); g.fill();

    return s;
  }

  function makeBulletSprite(size=8){
    const s = document.createElement('canvas');
    s.width = s.height = size;
    const g = s.getContext('2d');
    g.translate(size/2, size/2);
    const rad = size*0.45;
    const grad = g.createRadialGradient(0,0,1,0,0,rad);
    grad.addColorStop(0,'#fff'); grad.addColorStop(0.4,'#ffe7a3'); grad.addColorStop(1,'#ff9800');
    g.fillStyle=grad; g.beginPath(); g.arc(0,0,rad,0,Math.PI*2); g.fill();
    return s;
  }

  function makeEnemySprite(size=84){
    const s = document.createElement('canvas');
    s.width = s.height = size;
    const g = s.getContext('2d');
    g.translate(size/2,size/2);
    const r = size*0.36;
    // body (saucer)
    const body = g.createLinearGradient(0,-r,0,r);
    body.addColorStop(0,'#c8d7ff'); body.addColorStop(1,'#83a8ff');
    g.beginPath(); g.ellipse(0,0,r, r*0.5, 0, 0, Math.PI*2); g.fillStyle = body; g.fill();
    g.strokeStyle='rgba(8,20,40,0.8)'; g.lineWidth=3; g.stroke();

    // dome
    g.beginPath(); g.ellipse(0,-r*0.2,r*0.45,r*0.26,0,0,Math.PI*2);
    const dome = g.createLinearGradient(0,-r,0,0); dome.addColorStop(0,'#fff'); dome.addColorStop(1,'rgba(120,160,255,0.5)');
    g.fillStyle = dome; g.fill();
    g.stroke();

    // lights
    const lights = 6;
    for(let i=0;i<lights;i++){
      const a = Math.PI*(i/(lights-1)) - Math.PI*0.5;
      const x = Math.cos(a)*(r*0.6);
      const y = Math.sin(a)*(r*0.35);
      g.beginPath(); g.arc(x,y,r*0.08,0,Math.PI*2); g.fillStyle = i%2? '#ffd36d' : '#6fffd3'; g.fill();
    }

    // underside glow
    const grad = g.createRadialGradient(0,r*0.15,r*0.2, 0,r*0.6,r*0.9);
    grad.addColorStop(0,'rgba(120,220,255,0.18)'); grad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=grad; g.beginPath(); g.ellipse(0,r*0.45,r*0.75,r*0.33,0,0,Math.PI*2); g.fill();

    return s;
  }

  // create sprites
  function generateSprites(){
    SPRITES.ship = makeShipSprite(120);
    SPRITES.bullet = makeBulletSprite(10);
    SPRITES.enemy = makeEnemySprite(96);
    SPRITES.asteroid = makeAsteroidSprite(90);
  }

  // ----------------- ENTITIES -----------------
  class Ship {
    constructor(){
      this.x = canvas.width/DPR/2; this.y = canvas.height/DPR/2;
      this.vx = 0; this.vy = 0; this.angle = -Math.PI/2;
      this.radius = 20;
      this.thrusting = false;
      this.thrustPower = 0.18;
      this.maxSpeed = 9;
      this.fire = false;
      this.invuln = 0;
      this.score = 0;
    }
    update(dt){
      // rotation via keys or mobile joystick
      if (keys['ArrowLeft'] || keys['a']) this.angle -= 0.09 * dt*60;
      if (keys['ArrowRight'] || keys['d']) this.angle += 0.09 * dt*60;

      // thrust
      const up = keys['ArrowUp'] || keys['w'] || touchState.thrust;
      if (up) {
        this.vx += Math.cos(this.angle) * this.thrustPower * dt*60;
        this.vy += Math.sin(this.angle) * this.thrustPower * dt*60;
        this.thrusting = true;
        // particles
        if (Math.random() < 0.6) particles.push(new Particle(this.x - Math.cos(this.angle)*18, this.y - Math.sin(this.angle)*18, -Math.cos(this.angle)*rand(0.6,2.2), -Math.sin(this.angle)*rand(0.6,2.2), 30, '#ffb86b'));
      } else this.thrusting = false;

      // clamp speed softly
      const sp = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      if (sp > this.maxSpeed) { const f = this.maxSpeed/sp; this.vx *= f; this.vy *= f; }

      // movement & wrap
      this.x += this.vx * dt*60;
      this.y += this.vy * dt*60;
      wrapPos(this);
      if (this.invuln > 0) this.invuln -= dt*1000;

      // firing handled elsewhere with weaponTimer
    }
    draw(ctx){
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      // draw ship sprite centered
      const s = SPRITES.ship;
      ctx.drawImage(s, -s.width/4, -s.height/4, s.width/2, s.height/2);
      // thruster flame
      if (this.thrusting) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.ellipse(-18, 0, 8 + Math.random()*4, 16 + Math.random()*6, 0,0,Math.PI*2);
        ctx.fillStyle = 'rgba(255,130,40,0.9)'; ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
      // invuln ring
      if (this.invuln > 0) {
        ctx.strokeStyle = `rgba(160,220,255,${0.5+0.5*Math.sin(Date.now()/80)})`;
        ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0,0,this.radius+8,0,Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
  }

  class Bullet {
    constructor(x,y,vx,vy,life=90){
      this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.life = life; this.r = 4;
    }
    update(dt){
      this.x += this.vx * dt*60; this.y += this.vy * dt*60;
      wrapPos(this);
      this.life -= dt*60;
    }
    draw(ctx){
      const s = SPRITES.bullet;
      ctx.save();
      ctx.translate(this.x,this.y);
      ctx.drawImage(s, -s.width/6, -s.height/6, s.width/3, s.height/3);
      ctx.restore();
    }
  }

  class Asteroid {
    constructor(radius=40, x=null,y=null, vx=null, vy=null, stage=2){
      this.r = radius;
      if (x==null || y==null) {
        // spawn outside frame: choose edge and spawn beyond it
        const W = canvas.width/DPR, H = canvas.height/DPR;
        const side = Math.floor(rand(0,4));
        const margin = 60 + Math.max(W,H)*0.07;
        if (side===0){ this.x = -margin; this.y = rand(-margin,H+margin); }
        else if (side===1){ this.x = W + margin; this.y = rand(-margin,H+margin); }
        else if (side===2){ this.x = rand(-margin,W+margin); this.y = -margin; }
        else { this.x = rand(-margin,W+margin); this.y = H + margin; }

        // velocity towards play area center (but slightly randomized)
        const cx = W/2 + rand(-W*0.25, W*0.25), cy = H/2 + rand(-H*0.25,H*0.25);
        const angle = Math.atan2(cx - this.x, cy - this.y); // intentionally swapped for variation
        const speed = rand(0.3, 1.5) * (1 + (2-stage)*0.35);
        const ang = Math.atan2(cy - this.y, cx - this.x) + rand(-0.6,0.6);
        this.vx = Math.cos(ang)*speed; this.vy = Math.sin(ang)*speed;
      } else { this.x = x; this.y = y; this.vx = vx; this.vy = vy; }

      this.stage = stage; // 2 large, 1 medium, 0 small
      this.sprite = SPRITES.asteroid;
    }
    update(dt){
      this.x += this.vx * dt*60;
      this.y += this.vy * dt*60;
      // optionally wrap asteroids too if they leave entirely
      const W = canvas.width/DPR, H = canvas.height/DPR;
      if (this.x < -200) this.x = W + 200;
      if (this.x > W + 200) this.x = -200;
      if (this.y < -200) this.y = H + 200;
      if (this.y > H + 200) this.y = -200;
    }
    draw(ctx){
      ctx.save();
      ctx.translate(this.x, this.y);
      const s = this.sprite;
      const scale = (this.r/45);
      ctx.drawImage(s, -s.width*0.25*scale, -s.height*0.25*scale, s.width*0.5*scale, s.height*0.5*scale);
      ctx.restore();
    }
  }

  class Enemy {
    constructor(){
      const W = canvas.width/DPR, H = canvas.height/DPR;
      // spawn at top or side beyond border
      const side = Math.random() < 0.5 ? -1 : 1;
      this.x = side < 0 ? -60 : W + 60;
      this.y = rand(H*0.15, H*0.8);
      this.vx = -side * rand(0.7, 1.6);
      this.vy = rand(-0.2, 0.2);
      this.r = 26;
      this.sprite = SPRITES.enemy;
      this.cool = rand(60, 180);
    }
    update(dt){
      this.x += this.vx * dt*60; this.y += this.vy * dt*60;
      // wrap horizontally
      wrapPos(this);
      // occasionally shoot towards ship
      if (this.cool <= 0){
        const ang = Math.atan2(ship.y - this.y, ship.x - this.x);
        bullets.push(new Bullet(this.x, this.y, Math.cos(ang)*6, Math.sin(ang)*6, 120));
        this.cool = rand(90,220);
      } else this.cool -= dt*60;
    }
    draw(ctx){
      ctx.save();
      ctx.translate(this.x, this.y);
      // subtle bob
      const bob = Math.sin(Date.now()/250 + this.x)*3;
      ctx.translate(0,bob);
      const s = this.sprite;
      ctx.drawImage(s, -s.width*0.22, -s.height*0.22, s.width*0.44, s.height*0.44);
      ctx.restore();
    }
  }

  class Particle {
    constructor(x,y,vx,vy,life=40,color='#fff'){
      this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=life;this.color=color;
    }
    update(dt){ this.x+=this.vx*dt*60; this.y+=this.vy*dt*60; this.life-=dt*60; }
    draw(ctx){
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, this.life/40));
      ctx.fillStyle = this.color; ctx.fillRect(this.x-1.5, this.y-1.5, 3,3);
      ctx.restore();
    }
  }

  // TOUCH / MOBILE joystick simplified
  const touchState = { active:false, thrust:false, startX:0, startY:0, dx:0, dy:0, angle:0 };
  (function setupMobileControls(){
    const left = document.getElementById('joystickLeft');
    let baseX=0, baseY=0, stickX=0, stickY=0, active=false;

    function showHideMobile(){
      const small = window.innerWidth < 900;
      left.style.display = small ? 'block':'none';
      fireButton.style.display = small ? 'block':'none';
    }
    showHideMobile();
    window.addEventListener('resize', showHideMobile);

    left.addEventListener('touchstart', (e)=>{
      e.preventDefault();
      active=true;
      const t = e.touches[0];
      baseX = t.clientX; baseY = t.clientY;
      touchState.active = true;
      touchState.startX = baseX; touchState.startY = baseY;
    }, { passive:false });

    left.addEventListener('touchmove', (e)=>{
      if(!active) return;
      e.preventDefault();
      const t = e.touches[0];
      const dx = t.clientX - touchState.startX;
      const dy = t.clientY - touchState.startY;
      touchState.dx = dx; touchState.dy = dy;
      // determine rotation vs thrust
      if (Math.abs(dx) > 10) {
        // rotate
        if (dx < 0) keys['ArrowLeft'] = true;
        else keys['ArrowRight'] = true;
      } else { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; }
      // thrust when pulling up
      touchState.thrust = dy < -14;
      // if pulling down, stop thrust
    }, { passive:false });

    left.addEventListener('touchend', (e)=>{ active=false; touchState.active=false; touchState.dx=0; touchState.dy=0; keys['ArrowLeft']=false; keys['ArrowRight']=false; touchState.thrust=false; }, { passive:false });

    // fire button
    fireButton.addEventListener('touchstart', (e)=>{ e.preventDefault(); mouse.down = true; }, { passive:false });
    fireButton.addEventListener('touchend', (e)=>{ e.preventDefault(); mouse.down = false; }, { passive:false });

    // also allow tapping right-side to fire/aim
    canvas.addEventListener('touchstart', (e)=>{
      const t = e.touches[0];
      if (t.clientX > window.innerWidth*0.5) { mouse.down = true; mouse.x = t.clientX; mouse.y = t.clientY; }
    }, { passive:false });
    canvas.addEventListener('touchmove', (e)=>{
      const t = e.touches[0];
      if (t.clientX > window.innerWidth*0.5) { mouse.x = t.clientX; mouse.y = t.clientY; }
    }, { passive:false });
    canvas.addEventListener('touchend', (e)=>{ mouse.down = false; }, { passive:false });

  })();

  // Input
  window.addEventListener('keydown', (e)=>{ keys[e.key] = true; if (e.key === '1') setWeapon(0); if (e.key === '2') setWeapon(1); if (e.key === '3') setWeapon(2); if (e.key===' '){ e.preventDefault(); mouse.down=true; } });
  window.addEventListener('keyup', (e)=>{ keys[e.key] = false; if (e.key===' ') mouse.down=false; });

  canvas.addEventListener('mousemove', (e)=>{ const r = canvas.getBoundingClientRect(); mouse.x = (e.clientX - r.left); mouse.y = (e.clientY - r.top); });
  canvas.addEventListener('mousedown', (e)=>{ mouse.down = true; });
  window.addEventListener('mouseup', (e)=>{ mouse.down = false; });

  // joystick left is also clickable for desktop to simulate thrust
  joystickLeft.addEventListener('mousedown', e=>{ touchState.thrust = true; });
  joystickLeft.addEventListener('mouseup', e=>{ touchState.thrust = false; });

  // Weapon switching
  function setWeapon(i){
    currentWeapon = i;
    weaponTimer = 0; // instant ready
    statusEl.textContent = 'Weapon: ' + weapons[i].name;
    weaponBtns.forEach(b => b.style.background = b.dataset.w == i ? '#2b6ef6' : '#222');
  }
  weaponBtns.forEach(b => b.addEventListener('click', ()=> setWeapon(Number(b.dataset.w))));

  // audio placeholders (simple beep via oscillator). optional, but included
  const audioCtx = (window.AudioContext || window.webkitAudioContext) ? new (window.AudioContext || window.webkitAudioContext)() : null;
  function playTone(freq, time=0.05, type='sine', vol=0.02){
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + time);
  }

  // spawn helpers
  function spawnAsteroids(n=4){
    for(let i=0;i<n;i++){
      // pick stage 2=large
      const r = rand(30, 60);
      // avoid spawning too near the ship
      let tries = 0, attempt;
      do {
        attempt = new Asteroid(r);
        tries++;
      } while (dist(attempt, ship) < 140 && tries < 12);
      asteroids.push(attempt);
    }
  }

  function spawnEnemy(){
    enemies.push(new Enemy());
  }

  // collisions & splitting
  function hitAsteroid(ai, bx, by){
    const a = asteroids[ai];
    // explosion particles
    for(let i=0;i<18;i++) particles.push(new Particle(a.x, a.y, rand(-2,2), rand(-2,2), 40, '#fff'));
    // scoring
    state.score += 10 * (a.stage+1);
    // split
    if (a.stage > 0){
      const count = 2 + Math.floor(Math.random()*2);
      for(let i=0;i<count;i++){
        const rr = a.r * 0.55;
        const ang = rand(0,Math.PI*2);
        const spd = rand(0.6, 2.0);
        const nx = a.x + Math.cos(ang)*10; const ny = a.y + Math.sin(ang)*10;
        asteroids.push(new Asteroid(rr, nx, ny, Math.cos(ang)*spd, Math.sin(ang)*spd, a.stage-1));
      }
    }
    // remove original
    asteroids.splice(ai,1);
  }

  function collideEntities(){
    // bullets vs asteroids
    for (let bi = bullets.length-1; bi>=0; bi--){
      const b = bullets[bi];
      for (let ai = asteroids.length-1; ai>=0; ai--){
        const a = asteroids[ai];
        const dx = a.x - b.x, dy = a.y - b.y;
        if (dx*dx + dy*dy < (a.r+6)*(a.r+6)){
          // hit
          bullets.splice(bi,1);
          hitAsteroid(ai, b.x, b.y);
          playTone(800,0.02,'square',0.01);
          break;
        }
      }
    }
    // bullets vs enemies
    for (let bi = bullets.length-1; bi>=0; bi--){
      const b = bullets[bi];
      for (let ei = enemies.length-1; ei>=0; ei--){
        const e = enemies[ei];
        const dx = e.x - b.x, dy = e.y - b.y;
        if (dx*dx + dy*dy < (e.r+6)*(e.r+6)){
          bullets.splice(bi,1);
          // enemy destroyed
          for (let i=0;i<12;i++) particles.push(new Particle(e.x, e.y, rand(-2,2), rand(-2,2), 40, '#b9faff'));
          enemies.splice(ei,1);
          state.score += 75;
          playTone(1200,0.05,'sawtooth',0.02);
          break;
        }
      }
    }

    // asteroids vs ship
    for (let ai = asteroids.length-1; ai>=0; ai--){
      const a = asteroids[ai];
      const dx = a.x - ship.x, dy = a.y - ship.y;
      if (dx*dx + dy*dy < (a.r + ship.radius)*(a.r + ship.radius)){
        // hit
        for (let i=0;i<22;i++) particles.push(new Particle(ship.x + rand(-10,10), ship.y + rand(-10,10), rand(-4,4), rand(-4,4), 50, '#ffccaa'));
        ship.invuln = 1200;
        state.lives--;
        state.score = Math.max(0, state.score-25);
        playTone(120,0.2,'sine',0.04);
        // destroy asteroid
        asteroids.splice(ai,1);
        if (state.lives <= 0) gameOver();
        break;
      }
    }

    // enemies vs ship
    for (let ei = enemies.length-1; ei>=0; ei--){
      const e = enemies[ei];
      const dx = e.x - ship.x, dy = e.y - ship.y;
      if (dx*dx + dy*dy < (e.r + ship.radius)*(e.r + ship.radius)){
        for (let i=0;i<18;i++) particles.push(new Particle(ship.x + rand(-8,8), ship.y + rand(-8,8), rand(-3,3), rand(-3,3), 40, '#ffd'));
        state.lives--;
        enemies.splice(ei,1);
        if (state.lives <= 0) gameOver();
      }
    }
  }

  // firing
  function tryFire(){
    if (!state.running || state.paused) return;
    if (weaponTimer > 0) return;
    const w = weapons[currentWeapon];
    const shots = w.bulletsPerShot;
    const angBase = ship.angle;
    const spread = w.spread;
    for (let s=0; s<shots; s++){
      const a = angBase + (shots > 1 ? ( (s/(shots-1)) - 0.5 ) * spread : 0);
      const bx = ship.x + Math.cos(a)*26;
      const by = ship.y + Math.sin(a)*26;
      bullets.push(new Bullet(bx, by, Math.cos(a)*w.speed, Math.sin(a)*w.speed, 120));
    }
    weaponTimer = w.cooldown / 1000 * 60; // convert ms to frames (approx)
    playTone(1000 + Math.random()*300, 0.04, 'square', 0.015);
  }

  // game control
  function startGame(){
    generateSprites();
    ship = new Ship();
    bullets = []; asteroids = []; particles = []; enemies = [];
    state.running = true; state.paused = false;
    state.score = 0; state.lives = 3; state.level = 1;
    spawnAsteroids(4);
    setWeapon(0);
    center.style.display = 'none';
    lastTime = performance.now();
    // spawn enemies periodically
    enemySpawnTimer = 7000;
    requestAnimationFrame(loop);
  }

  function pauseToggle(){
    if (!state.running) return;
    state.paused = !state.paused;
    pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
    if (!state.paused) { lastTime = performance.now(); requestAnimationFrame(loop); }
  }

  function gameOver(){
    state.running = false;
    center.style.display = 'block';
    document.getElementById('title').textContent = 'GAME OVER';
    startBtn.textContent = 'Restart';
    center.appendChild(startBtn); // ensure visible
    center.querySelector('button').style.display='inline-block';
  }

  // Start/pause handlers
  startBtn.addEventListener('click', () => {
    startGame();
  });
  pauseBtn.addEventListener('click', pauseToggle);

  // weapon UI initial state
  setWeapon(0);

  // level & enemy spawn timers
  let enemySpawnTimer = 7000;
  let levelTimer = 0;
  let spawnCooldown = 0;

  // main loop
  function loop(now){
    if (!state.running) return;
    if (state.paused) return;
    const dt = Math.min(0.033, (now - lastTime)/1000);
    lastTime = now;

    // input: aim via mouse/touch — set ship.angle to aim direction (mouse on right half or if not mobile, always allow mouse)
    if (mouse.x !== undefined && (mouse.down || !isMobile())) {
      // convert click pos to canvas coords
      const rect = canvas.getBoundingClientRect();
      const px = mouse.x; const py = mouse.y;
      // angle to cursor
      const ang = Math.atan2(py - ship.y, px - ship.x);
      ship.angle = ang;
    } else {
      // keyboard rotation handled in ship.update
    }

    // update entities
    ship.update(dt);
    for (let i=bullets.length-1;i>=0;i--){
      bullets[i].update(dt);
      if (bullets[i].life <= 0) bullets.splice(i,1);
    }
    for (let a of asteroids) a.update(dt);
    for (let i=particles.length-1;i>=0;i--){ particles[i].update(dt); if (particles[i].life<=0) particles.splice(i,1); }
    for (let e of enemies) e.update(dt);

    // firing if mouse down or mobile fire
    if (mouse.down) {
      if (weaponTimer <= 0) tryFire();
    } else {
      // keyboard space handled earlier
    }
    if (weaponTimer > 0) weaponTimer -= dt*60;

    // collisions
    collideEntities();

    // enemy & level timers
    enemySpawnTimer -= dt*1000;
    if (enemySpawnTimer <= 0) { spawnEnemy(); enemySpawnTimer = rand(6000,14000); }
    levelTimer += dt*1000;
    if (levelTimer > 15000) {
      state.level++; levelTimer = 0; // increase challenge
      spawnAsteroids(2 + Math.floor(state.level*0.8));
    }
    // occasionally spawn small asteroids
    spawnCooldown -= dt*60;
    if (spawnCooldown <= 0) { spawnAsteroids(1); spawnCooldown = rand(100,400); }

    // draw
    drawScene();

    // update UI
    scoreEl.textContent = state.score;
    livesEl.textContent = state.lives;
    levelEl.textContent = state.level;

    requestAnimationFrame(loop);
  }

  function drawScene(){
    const W = canvas.width/DPR, H = canvas.height/DPR;
    // clear
    ctx.fillStyle = '#02020a'; ctx.fillRect(0,0, W, H);

    // starfield background
    for (let i=0;i<80;i++){
      const x = (i*9973)%W; // deterministic-ish
      const y = (i*1931)%H;
      const s = (i%7===0)?1.6: (i%5===0?1.1:0.6);
      ctx.fillStyle = i%7===0 ? 'rgba(180,220,255,0.9)' : 'rgba(200,220,255,0.08)';
      ctx.fillRect(x, y, s, s);
    }

    // draw asteroids behind
    for (let a of asteroids) a.draw(ctx);

    // draw enemies
    for (let e of enemies) e.draw(ctx);

    // draw bullets
    for (let b of bullets) b.draw(ctx);

    // draw particles
    for (let p of particles) p.draw(ctx);

    // draw ship on top
    ship.draw(ctx);

    // HUD crosshair (aim)
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.arc(ship.x, ship.y, 32, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // helpers
  function isMobile(){ return window.innerWidth < 900; }

  // init
  generateSprites();
  // initial title text
  document.getElementById('title').textContent = 'ASTEROID BLASTER';
  // small guidance
  statusEl.textContent = 'Ready — Select weapon 1/2/3 or buttons. Press Start.';

  // make sure audio unlocked on mobile: attach a short sound to first user interaction
  function unlockAudio(){
    if (!audioCtx) return;
    const s = audioCtx.createOscillator(); const g = audioCtx.createGain();
    s.connect(g); g.connect(audioCtx.destination);
    s.frequency.value = 200; g.gain.value = 0.0001;
    s.start(0); s.stop(0.02);
    window.removeEventListener('touchstart', unlockAudio);
    window.removeEventListener('mousedown', unlockAudio);
  }
  window.addEventListener('touchstart', unlockAudio, {once:true});
  window.addEventListener('mousedown', unlockAudio, {once:true});

})();
</script>
